<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ElderCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">❤️ ElderCare</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="caregivers.html">Caregivers</a>
            <a href="bookings.html">My Bookings</a>
            <a href="profile.html" class="active">Profile</a>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </nav>
    </header>

    <div class="profile-container">
        <div class="profile-header">
            <h1>My Profile</h1>
            <p>Manage your personal information and care preferences</p>
        </div>

        <div class="profile-card">
            <form id="profileForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900">
                </div>
                
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="3" placeholder="Your full address"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="emergencyContact">Emergency Contact</label>
                    <input type="text" id="emergencyContact" name="emergencyContact" placeholder="Name and phone number">
                </div>
                
                <div class="form-group">
                    <label for="medicalInfo">Medical Information (Optional)</label>
                    <textarea id="medicalInfo" name="medicalInfo" rows="4" placeholder="Any medical conditions, allergies, or special needs"></textarea>
                </div>
                
                <button type="submit" class="btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 ElderCare. Your privacy is our priority.</p>
    </footer>

    <script src="/js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
