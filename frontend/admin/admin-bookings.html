<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-sidebar {
            background: #1e293b;
            color: white;
            width: 260px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }
        .admin-content {
            margin-left: 260px;
            padding: 2rem;
        }
        .admin-nav-item {
            padding: 1rem 1.5rem;
            display: block;
            color: #cbd5e1;
            text-decoration: none;
        }
        .admin-nav-item:hover, .admin-nav-item.active {
            background: #334155;
            color: white;
        }
        .bookings-table {
            width: 100%;
            background: white;
            border-radius: 1rem;
            overflow-x: auto;
        }
        .bookings-table th, .bookings-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .bookings-table th {
            background: #f8fafc;
        }
        select {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            border: 1px solid #d1d5db;
        }
        .status-pending { background: #fef3c7; color: #92400e; padding: 0.25rem 0.5rem; border-radius: 20px; }
        .status-accepted { background: #d1fae5; color: #065f46; padding: 0.25rem 0.5rem; border-radius: 20px; }
        .status-completed { background: #e0e7ff; color: #3730a3; padding: 0.25rem 0.5rem; border-radius: 20px; }
        .status-cancelled { background: #fee2e2; color: #991b1b; padding: 0.25rem 0.5rem; border-radius: 20px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 0.25rem 0.75rem; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-sidebar">
        <div style="padding: 1.5rem; text-align: center;">
            <h2>❤️ ElderCare</h2>
            <p style="font-size: 0.85rem;">Admin Panel</p>
        </div>
        <nav>
            <a href="admin-dashboard.html" class="admin-nav-item">📊 Dashboard</a>
            <a href="admin-users.html" class="admin-nav-item">👥 Users</a>
            <a href="admin-caregivers.html" class="admin-nav-item">👩‍⚕️ Caregivers</a>
            <a href="admin-bookings.html" class="admin-nav-item active">📅 Bookings</a>
            <a href="admin-services.html" class="admin-nav-item">⚙️ Services</a>
            <a href="admin-reports.html" class="admin-nav-item">📈 Reports</a>
            <a href="../index.html" class="admin-nav-item">🚪 Frontend</a>
        </nav>
        <div style="position: absolute; bottom: 0; width: 100%; padding: 1rem;">
            <button onclick="logout()" style="width: 100%; background: #dc2626; color: white; border: none; padding: 0.75rem; border-radius: 8px;">Logout</button>
        </div>
    </div>

    <div class="admin-content">
        <h1 style="margin-bottom: 2rem;">Manage Bookings</h1>
        
        <div class="bookings-table">
            <table style="width: 100%;">
                <thead>
                    <tr>
                        <th>Booking ID</th><th>Caregiver</th><th>Date</th><th>Amount</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
