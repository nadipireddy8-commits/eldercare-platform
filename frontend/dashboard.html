<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ElderCare</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E❤️%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">❤️ ElderCare</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="caregivers.html">Caregivers</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="bookings.html">My Bookings</a>
            <a href="profile.html">Profile</a>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </nav>
    </header>

    <div class="dashboard-container">
        <div class="welcome-banner">
            <h1>Welcome back, <span id="userName">User</span>! 👋</h1>
            <p>Manage your care services and track bookings</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-info">
                    <h3 id="totalBookings">0</h3>
                    <p>Total Bookings</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔄</div>
                <div class="stat-info">
                    <h3 id="activeBookings">0</h3>
                    <p>Active Bookings</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <h3 id="completedBookings">0</h3>
                    <p>Completed</p>
                </div>
            </div>
        </div>

        <div class="recent-bookings">
            <h2>Recent Bookings</h2>
            <div id="recentBookingsList" class="bookings-list"></div>
        </div>

        <div class="recommended-caregivers">
            <h2>Recommended Caregivers</h2>
            <div id="recommendedCaregivers" class="caregivers-grid"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 ElderCare. Compassionate care for every senior.</p>
    </footer>

    <script src="/js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
