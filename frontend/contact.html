<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ElderCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">❤️ ElderCare</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="caregivers.html">Caregivers</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="login.html" id="loginNav">Login</a>
            <a href="register.html" id="registerNav">Register</a>
            <a href="dashboard.html" id="dashboardNav" style="display:none;">Dashboard</a>
            <button id="logoutNavBtn" style="display:none;" class="logout-btn">Logout</button>
        </nav>
    </header>

    <div class="page-header">
        <h1>Contact Us</h1>
        <p>We're here to help 24/7</p>
    </div>

    <div class="container" style="max-width: 800px; margin: 2rem auto; padding: 0 2rem;">
        <div class="card">
            <h2>Get in Touch</h2>
            
            <div class="contact-info" style="margin: 2rem 0;">
                <p><strong>📞 Phone:</strong> 1-800-ELDER-CARE (1-800-353-3722)</p>
                <p><strong>✉️ Email:</strong> support@eldercare.com</p>
                <p><strong>📍 Address:</strong> 123 Care Lane, Suite 100, San Francisco, CA 94105</p>
            </div>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </div>
    </div>

    

    <script src="/js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('contactForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            showToast('Message sent! We\'ll get back to you soon.');
            e.target.reset();
        });
    </script>
</body>
</html>
