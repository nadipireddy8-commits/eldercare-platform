<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Caregiver</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-form {
            max-width: 600px;
            margin: 0 auto;
        }
        .verified-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: #d1fae5;
            color: #065f46;
        }
        .pending-badge {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">❤️ ElderCare</div>
        <nav>
            <a href="caregiver-dashboard.html">Dashboard</a>
            <a href="caregiver-requests.html">All Requests</a>
            <a href="caregiver-earnings.html">Earnings</a>
            <a href="caregiver-profile.html" class="active">My Profile</a>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </nav>
    </header>

    <div class="dashboard-container">
        <div class="welcome-banner">
            <h1>My Profile</h1>
            <p>Manage your professional information</p>
        </div>

        <div class="profile-card" style="max-width: 600px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 1rem;">
                <span id="verifiedBadge" class="verified-badge">Loading...</span>
            </div>
            
            <form id="caregiverProfileForm" class="profile-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="caregiverNameInput" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="caregiverEmail" readonly disabled>
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="caregiverPhone">
                </div>
                
                <div class="form-group">
                    <label>Service Type</label>
                    <select id="caregiverService">
                        <option value="Companionship">Companionship</option>
                        <option value="Medical Care">Medical Care</option>
                        <option value="Personal Care">Personal Care</option>
                        <option value="Dementia Care">Dementia Care</option>
                        <option value="Physical Therapy">Physical Therapy</option>
                        <option value="24/7 Care">24/7 Care</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Experience (years)</label>
                    <input type="number" id="caregiverExperience" min="0">
                </div>
                
                <div class="form-group">
                    <label>Hourly Rate ($)</label>
                    <input type="number" id="caregiverRate" min="15">
                </div>
                
                <div class="form-group">
                    <label>Bio / Description</label>
                    <textarea id="caregiverBio" rows="4" placeholder="Tell families about your experience, skills, and approach to care..."></textarea>
                </div>
                
                <button type="submit" class="btn-primary btn-full">Save Changes</button>
            </form>
        </div>
    </div>

    

    <script src="/js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/caregiver
